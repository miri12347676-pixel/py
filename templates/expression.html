<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Крылатое выражение</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 700px;
            width: 100%;
        }
        .quote {
            color: #2c3e50;
            font-size: 1.3em;
            line-height: 1.6;
            margin-bottom: 20px;
            font-style: italic;
        }
        .author {
            color: #7f8c8d;
            font-size: 1.1em;
            text-align: right;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
        @media (max-width: 600px) {
            .card {
                padding: 20px;
            }
            .quote {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="quote">«Как ты думаешь, когда человек умирает? Когда пуля из пистолета пронзает его сердце? Нет. Когда на него нападает неизлечимая болезнь? Нет. Когда он съедает суп из смертельно ядовитых грибов? Нет. Человек умирает, когда люди его забывают!»</div>
        <div class="author">— Доктор Хирург</div>
    </div>
</body>
</html>
